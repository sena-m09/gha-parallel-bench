name: bench-parallel

on:
  workflow_dispatch:

jobs:
  ci:
    name: lint+typecheck+test+build (parallel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - parallel:
          - name: Lint
            run: pnpm lint

          - name: Typecheck
            run: pnpm typecheck

          - name: Test
            run: pnpm test

          - name: Build
            run: pnpm build
