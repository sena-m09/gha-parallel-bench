name: bench-on-comment

on:
  issue_comment:
    types: [created]

# 同一 issue で連打された /bench を直列化し、暴走時のコスト爆発を防ぐ。
concurrency:
  group: bench-on-comment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  bench:
    if: >
      github.repository_owner == 'sena-m09' &&
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == 'sena-m09' &&
      startsWith(github.event.comment.body, '/bench')
    runs-on: ubuntu-latest
    # 万一 comment.user.login のガードを突破された場合の課金ストッパー。
    # required reviewers を設定した GitHub Environment 側で追加の人手承認を挟むことを想定。
    environment: bench
    timeout-minutes: 350
    permissions:
      issues: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: React 👀 to the trigger comment
        run: |
          gh api -X POST \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'

      - name: Parse N from comment body
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          N=$(printf '%s' "$COMMENT_BODY" | grep -oE 'n=[0-9]+' | head -1 | cut -d= -f2)
          N=${N:-5}
          # 1 回のトリガーで走らせられる上限。dispatch は N × 4 workflow なので N=50 で 200 run。
          MAX_N=50
          if [ "$N" -gt "$MAX_N" ]; then
            echo "requested N=$N exceeds MAX_N=$MAX_N, clamping"
            N=$MAX_N
          fi
          echo "n=$N" >> "$GITHUB_OUTPUT"
          echo "requested N=$N"

      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Announce start
        run: |
          gh issue comment ${{ github.event.issue.number }} --body \
            "▶️ ベンチ開始 (N=${{ steps.parse.outputs.n }} × 4 workflow = $(( ${{ steps.parse.outputs.n }} * 4 )) run)。run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Run benchmark
        run: pnpm bench -- --n ${{ steps.parse.outputs.n }} --branch ${{ github.ref_name }}

      - name: Analyze
        run: pnpm analyze results.csv REPORT.md

      - name: Post report as comment
        run: |
          {
            echo "✅ ベンチ完了 (N=${{ steps.parse.outputs.n }})"
            echo ""
            cat REPORT.md
            echo ""
            echo "---"
            echo "run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > final-comment.md
          gh issue comment ${{ github.event.issue.number }} --body-file final-comment.md

      - name: Upload raw CSV as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ github.run_id }}
          path: results.csv

      - name: React ✅ on success / ❌ on failure
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then EMOJI="+1"; else EMOJI="-1"; fi
          gh api -X POST \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content="$EMOJI"
